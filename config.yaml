# Web3 Smart RPC Router — sample configuration.
#
# This file exercises every required field in core/models.py: a `global`
# block with listen_port, probe_interval_seconds, request_timeout_seconds,
# routing_strategy, and max_retries, plus two rpc_nodes with distinct
# providers and distinct priorities.
#
# Validate with:  python -m core.config config.yaml

global:
  listen_port: 8545
  probe_interval_seconds: 5.0
  request_timeout_seconds: 10.0
  routing_strategy: priority
  max_retries: 3

method_routes:
  # Send log-heavy queries to the highest-priority archive-capable provider.
  eth_getLogs:
    providers:
      - publicnode-eth
    routing_strategy: priority

  # Keep transaction broadcast on the fallback chain for resilience.
  eth_sendRawTransaction:
    providers:
      - drpc-eth
      - publicnode-eth
    routing_strategy: failover

rpc_nodes:
  # Highest-priority node: HTTPS Publicnode Ethereum gateway.
  - provider: publicnode-eth
    url: https://ethereum-rpc.publicnode.com
    priority: 1
    weight: 1
    headers: {}

  # Fallback node: HTTPS Drpc endpoint, lower priority.
  - provider: drpc-eth
    url: https://eth.drpc.org
    priority: 2
    weight: 1
    headers: {}
